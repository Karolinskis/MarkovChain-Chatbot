version: "2"

linters:
  enable:
    # bugs
    - bodyclose
    - copyloopvar
    - durationcheck
    - errorlint
    - gocritic
    - intrange
    - nilerr
    - nolintlint
    - rowserrcheck
    - sqlclosecheck
    - unconvert
    - unparam
    - wastedassign
    # style
    - goconst
    - gocyclo
    - godot
    - misspell
    - nakedret
    - predeclared
    - revive
    - thelper
    - usestdlibvars
    - whitespace
  settings:
    errcheck:
      exclude-functions:
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - goconst

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - markovchain-chatbot
